name: ilp-efti-connector

networks:
  efti-net:
    driver: bridge

volumes:
  mariadb-data:
  rabbitmq-data:
  redis-data:
  seq-data:
  grafana-data:
  prometheus-data:
  keycloak-db-data:

services:

  # ── Database ──────────────────────────────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: ilp-efti-connector-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d
    networks:
      - efti-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message Broker ────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ilp-efti-connector-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    ports:
      - "5672:5672"
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - efti-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ilp-efti-connector-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - efti-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Identity Provider ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ilp-efti-connector-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_OVERRIDE: "true"
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - efti-net

  keycloak-db:
    image: postgres:16-alpine
    container_name: ilp-efti-connector-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - efti-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Logging ───────────────────────────────────────────────────
  seq:
    image: datalust/seq:2024
    container_name: ilp-efti-connector-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: ""
    ports:
      - "5341:5341"    # Ingestion API
      - "8888:80"      # Web UI → http://localhost:8888
    volumes:
      - seq-data:/data
    networks:
      - efti-net

  # ── Monitoring ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ilp-efti-connector-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - efti-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ilp-efti-connector-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3001:3000"    # UI → http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - efti-net

  # ── Frontend React ───────────────────────────────────────────
  frontend:
    build:
      context: ../../src/Frontend/efti-form
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-efti_connector}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-efti-form-frontend}
    container_name: ilp-efti-connector-frontend
    restart: unless-stopped
    ports:
      - "3100:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # raggiunge i servizi .NET sull'host
    depends_on:
      - keycloak
    networks:
      - efti-net

  # ── Mock MILOS (solo dev — Fase 1) ───────────────────────────
  milos-mock:
    image: wiremock/wiremock:3.5.2
    container_name: ilp-efti-connector-milos-mock
    command: --global-response-templating --disable-banner
    ports:
      - "9999:8080"
    volumes:
      - ./milos-mock:/home/wiremock/__files
      - ./milos-mock/mappings:/home/wiremock/mappings
    networks:
      - efti-net
    profiles:
      - dev    # avviato solo con: docker compose --profile dev up
