version: "3.9"

# ─── Infrastruttura locale per sviluppo ──────────────────────────────────────
# Avvio:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (cancella volumi → DB svuotato)

services:

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: efti_rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672  (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MariaDB ───────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: efti_mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: efti_connector
      MARIADB_USER: efti
      MARIADB_PASSWORD: efti_dev
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: efti_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  mariadb_data:
  redis_data:
