server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # QueryProxyService — deve venire PRIMA di /api (porta 5021)
    location /api/query {
        proxy_pass http://host.docker.internal:5021;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FormInputService (porta 5006)
    location /api {
        proxy_pass http://host.docker.internal:5006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — tutte le route non-file tornano a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
