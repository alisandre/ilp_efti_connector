<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Diagram — Database Schema</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2230;
    --accent: #00e5a0;
    --accent2: #4d7cfe;
    --accent3: #f7b731;
    --accent4: #ff6b81;
    --text: #e8eaf0;
    --text-dim: #6b7280;
    --pk: #00e5a0;
    --fk: #4d7cfe;
    --field: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow: hidden;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    color: var(--accent);
  }

  .legend {
    display: flex;
    gap: 18px;
    font-size: 0.72rem;
    color: var(--text-dim);
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .controls {
    display: flex;
    gap: 8px;
  }
  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }

  #canvas-wrap {
    position: fixed;
    inset: 54px 0 0 0;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap.grabbing { cursor: grabbing; }

  svg {
    width: 100%;
    height: 100%;
  }

  /* Table cards */
  .table-card {
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
    cursor: pointer;
    transition: filter 0.2s;
  }
  .table-card:hover { filter: drop-shadow(0 6px 32px rgba(0,229,160,0.18)); }

  .card-bg {
    rx: 8;
    fill: var(--surface);
    stroke: var(--border);
    stroke-width: 1;
  }
  .card-bg.highlighted { stroke: var(--accent); stroke-width: 1.5; }

  .header-bg { fill: #161a24; rx: 0; }
  .header-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    fill: var(--text);
    letter-spacing: 0.05em;
  }
  .table-type {
    font-size: 9px;
    fill: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .field-name {
    font-size: 10px;
    fill: var(--field);
    font-family: 'JetBrains Mono', monospace;
  }
  .field-type {
    font-size: 9px;
    fill: #4b5563;
    font-family: 'JetBrains Mono', monospace;
  }
  .badge-pk {
    fill: rgba(0,229,160,0.12);
    stroke: rgba(0,229,160,0.4);
    stroke-width: 0.8;
    rx: 3;
  }
  .badge-fk {
    fill: rgba(77,124,254,0.12);
    stroke: rgba(77,124,254,0.4);
    stroke-width: 0.8;
    rx: 3;
  }
  .badge-text-pk { font-size: 8px; fill: var(--pk); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .badge-text-fk { font-size: 8px; fill: var(--fk); font-family: 'JetBrains Mono', monospace; font-weight: 600; }

  /* Relations */
  .rel-line {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.45;
  }
  .rel-cascade { stroke: var(--accent4); }
  .rel-restrict { stroke: var(--accent2); }
  .rel-setnull  { stroke: var(--accent3); }

  .rel-label {
    font-size: 8.5px;
    fill: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: #161a24;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text);
    max-width: 260px;
    z-index: 200;
    display: none;
    line-height: 1.7;
  }
  #tooltip .tt-title { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); font-size: 12px; margin-bottom: 4px; }
  #tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; }
  #tooltip .tt-key { color: var(--text-dim); }
  #tooltip .tt-val { color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>⬡ ER DIAGRAM — MariaDB 11.4</h1>
  <div class="legend">
    <span><span class="dot" style="background:var(--pk)"></span> PK</span>
    <span><span class="dot" style="background:var(--fk)"></span> FK</span>
    <span><span class="dot" style="background:var(--accent4)"></span> CASCADE</span>
    <span><span class="dot" style="background:var(--accent2)"></span> RESTRICT</span>
    <span><span class="dot" style="background:var(--accent3)"></span> SET NULL</span>
  </div>
  <div class="controls">
    <button class="btn" onclick="resetView()">Reset View</button>
    <button class="btn" onclick="zoomIn()">＋</button>
    <button class="btn" onclick="zoomOut()">－</button>
  </div>
</header>

<div id="canvas-wrap">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr-cascade" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent4)" opacity="0.7"/>
      </marker>
      <marker id="arr-restrict" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent2)" opacity="0.7"/>
      </marker>
      <marker id="arr-setnull" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent3)" opacity="0.7"/>
      </marker>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M40 0 L0 0 0 40" fill="none" stroke="#1a1f2e" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect id="grid-bg" x="-5000" y="-5000" width="15000" height="15000" fill="url(#grid)"/>
    <g id="root">
      <g id="rel-layer"></g>
      <g id="table-layer"></g>
    </g>
  </svg>
</div>

<div id="tooltip"></div>

<script>

// ─────────────────────────────────────────────

const tables = [

    x: 1150, y: 300,
    fields: [
      {name:'id', type:'CHAR(36)', pk:true},
      {name:'source_id', type:'CHAR(36)', fk:'sources'},
      {name:'transport_operation_id', type:'CHAR(36)', fk:'transport_operations'},
      {name:'correlation_id', type:'CHAR(36)', info:'NOT NULL INDEXED'},
      {name:'gateway_provider', type:'VARCHAR(20)', info:'MILOS|EFTI_NATIVE'},

      {name:'external_id', type:'VARCHAR(100)'},

    ]
  },
  {
    id: 'transport_consignees', label: 'transport_consignees', tag: 'DESTINATARIO',
    x: 80, y: 1060,
    fields: [
      {name:'id', type:'CHAR(36)', pk:true},
      {name:'transport_operation_id', type:'CHAR(36)', fk:'transport_operations', info:'UNIQUE NOT NULL'},
      {name:'name', type:'VARCHAR(300)', info:'NOT NULL'},
      {name:'player_type', type:'VARCHAR(30)', info:'CONSIGNEE'},
      {name:'street_name', type:'VARCHAR(300)'},

  {

    x: 1150, y: 680,

      {name:'transport_operation_id', type:'CHAR(36)', fk:'transport_operations', info:'UNIQUE NOT NULL'},
      {name:'total_item_quantity', type:'INT', info:'NOT NULL'},

  },
  {

    x: 1150, y: 1040,
    fields: [

      {name:'shipping_marks', type:'VARCHAR(100)'},
      {name:'item_quantity', type:'INT', info:'NOT NULL'},

  {

    x: 1150, y: 60,
    fields: [
      {name:'id', type:'CHAR(36)', pk:true},
      {name:'entity_type', type:'VARCHAR(50)', info:'NOT NULL INDEXED'},
      {name:'entity_id', type:'CHAR(36)', info:'NOT NULL INDEXED'},
      {name:'action_type', type:'VARCHAR(20)', info:'NOT NULL'},
      {name:'performed_by_user_id', type:'CHAR(36)', fk:'users'},
      {name:'performed_by_source_id', type:'CHAR(36)'},

      {name:'old_value_json', type:'JSON'},
      {name:'new_value_json', type:'JSON'},
      {name:'ip_address', type:'VARCHAR(45)'},
      {name:'user_agent', type:'VARCHAR(500)'},
      {name:'created_at', type:'DATETIME', info:'NOT NULL INDEXED'},
    ]
  },
];

// Relations: from, to, cardinality, onDelete
const relations = [
  {from:'sources', to:'customers', card:'1:N', del:'SET NULL'},
  {from:'sources', to:'transport_operations', card:'1:N', del:'RESTRICT'},
  {from:'sources', to:'efti_messages', card:'1:N', del:'RESTRICT'},
  {from:'customers', to:'customer_destinations', card:'1:N', del:'CASCADE'},
  {from:'customers', to:'transport_operations', card:'1:N', del:'RESTRICT'},
  {from:'customer_destinations', to:'transport_operations', card:'1:N', del:'SET NULL'},
  {from:'users', to:'transport_operations', card:'1:N', del:'SET NULL'},
  {from:'users', to:'audit_logs', card:'1:N', del:'SET NULL'},
  {from:'transport_operations', to:'efti_messages', card:'1:N', del:'CASCADE'},
  {from:'transport_operations', to:'transport_consignees', card:'1:1', del:'CASCADE'},
  {from:'transport_operations', to:'transport_carriers', card:'1:N', del:'CASCADE'},
  {from:'transport_operations', to:'transport_details', card:'1:1', del:'CASCADE'},
  {from:'transport_operations', to:'transport_consignment_items', card:'1:1', del:'CASCADE'},
  {from:'transport_consignment_items', to:'transport_packages', card:'1:N', del:'CASCADE'},
];

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
const svg = document.getElementById('svg');
const relLayer = document.getElementById('rel-layer');
const tableLayer = document.getElementById('table-layer');

function tableHeight(t) { return HEAD_H + t.fields.length * ROW_H + PAD; }

function getTableById(id) { return tables.find(t => t.id === id); }

function tableCenter(t) {
  const h = tableHeight(t);
  return { x: t.x + W/2, y: t.y + h/2 };
}

function tableEdge(t, targetX, targetY) {
  const cx = t.x + W/2;
  const cy = t.y + tableHeight(t)/2;
  const dx = targetX - cx;
  const dy = targetY - cy;
  const h = tableHeight(t);
  // Compute intersection with rect
  const scaleX = Math.abs(dx) > 0 ? (W/2) / Math.abs(dx) : Infinity;
  const scaleY = Math.abs(dy) > 0 ? (h/2) / Math.abs(dy) : Infinity;
  const scale = Math.min(scaleX, scaleY);
  return { x: cx + dx * scale, y: cy + dy * scale };
}

function delClass(del) {
  if (del === 'CASCADE') return 'rel-cascade';
  if (del === 'RESTRICT') return 'rel-restrict';
  return 'rel-setnull';
}
function delMarker(del) {
  if (del === 'CASCADE') return 'url(#arr-cascade)';
  if (del === 'RESTRICT') return 'url(#arr-restrict)';
  return 'url(#arr-setnull)';
}

// Draw relations
relations.forEach(rel => {
  const fromT = getTableById(rel.from);
  const toT = getTableById(rel.to);
  const toC = tableCenter(toT);
  const fromC = tableCenter(fromT);
  const fromP = tableEdge(fromT, toC.x, toC.y);
  const toP = tableEdge(toT, fromC.x, fromC.y);

  // Curved path
  const midX = (fromP.x + toP.x) / 2;
  const midY = (fromP.y + toP.y) / 2;
  const cpX = midX + (fromP.y - toP.y) * 0.18;
  const cpY = midY + (toP.x - fromP.x) * 0.18;
  const d = `M ${fromP.x} ${fromP.y} Q ${cpX} ${cpY} ${toP.x} ${toP.y}`;

  const cls = delClass(rel.del);
  const marker = delMarker(rel.del);

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('class', `rel-line ${cls}`);
  path.setAttribute('marker-end', marker);
  relLayer.appendChild(path);

  // Cardinality label at midpoint
  const lx = cpX;
  const ly = cpY;
  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x', lx);
  lbl.setAttribute('y', ly);
  lbl.setAttribute('class', 'rel-label');
  lbl.setAttribute('text-anchor', 'middle');
  lbl.setAttribute('dominant-baseline', 'middle');
  lbl.textContent = rel.card;
  relLayer.appendChild(lbl);
});

// Draw tables
tables.forEach(t => {
  const h = tableHeight(t);
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class', 'table-card');
  g.setAttribute('transform', `translate(${t.x},${t.y})`);

  // Card bg
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('width', W);
  rect.setAttribute('height', h);
  rect.setAttribute('class', 'card-bg');
  rect.setAttribute('rx', 8);
  g.appendChild(rect);

  // Header bg
  const hbg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hbg.setAttribute('width', W);
  hbg.setAttribute('height', HEAD_H);
  hbg.setAttribute('class', 'header-bg');
  hbg.setAttribute('rx', 8);
  g.appendChild(hbg);
  // Fix bottom corners of header
  const hbg2 = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hbg2.setAttribute('y', HEAD_H - 8);
  hbg2.setAttribute('width', W);
  hbg2.setAttribute('height', 8);
  hbg2.setAttribute('fill', '#161a24');
  g.appendChild(hbg2);

  // Table name
  const title = document.createElementNS('http://www.w3.org/2000/svg','text');
  title.setAttribute('x', 12);
  title.setAttribute('y', 18);
  title.setAttribute('class', 'header-text');
  title.textContent = t.label;
  g.appendChild(title);

  // Tag
  const tag = document.createElementNS('http://www.w3.org/2000/svg','text');
  tag.setAttribute('x', 12);
  tag.setAttribute('y', 34);
  tag.setAttribute('class', 'table-type');
  tag.textContent = t.tag;
  g.appendChild(tag);

  // Separator line
  const sep = document.createElementNS('http://www.w3.org/2000/svg','line');
  sep.setAttribute('x1', 0); sep.setAttribute('y1', HEAD_H);
  sep.setAttribute('x2', W); sep.setAttribute('y2', HEAD_H);
  sep.setAttribute('stroke', '#1e2230'); sep.setAttribute('stroke-width', 1);
  g.appendChild(sep);

  // Fields
  t.fields.forEach((f, i) => {
    const fy = HEAD_H + i * ROW_H + ROW_H/2 + 2;

    // Alternating row bg
    if (i % 2 === 1) {
      const rbg = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rbg.setAttribute('y', HEAD_H + i * ROW_H);
      rbg.setAttribute('width', W);
      rbg.setAttribute('height', ROW_H);
      rbg.setAttribute('fill', 'rgba(255,255,255,0.018)');
      if (i === t.fields.length -1) { rbg.setAttribute('rx', 0); }
      g.appendChild(rbg);
    }

    // Badge
    if (f.pk || f.fk) {
      const bw = f.pk ? 18 : 16;
      const bx = W - bw - 6;
      const badge = document.createElementNS('http://www.w3.org/2000/svg','rect');
      badge.setAttribute('x', bx);
      badge.setAttribute('y', fy - 8);
      badge.setAttribute('width', bw);
      badge.setAttribute('height', 13);
      badge.setAttribute('class', f.pk ? 'badge-pk' : 'badge-fk');
      badge.setAttribute('rx', 3);
      g.appendChild(badge);

      const bt = document.createElementNS('http://www.w3.org/2000/svg','text');
      bt.setAttribute('x', bx + bw/2);
      bt.setAttribute('y', fy + 1);
      bt.setAttribute('text-anchor', 'middle');
      bt.setAttribute('dominant-baseline', 'middle');
      bt.setAttribute('class', f.pk ? 'badge-text-pk' : 'badge-text-fk');
      bt.textContent = f.pk ? 'PK' : 'FK';
      g.appendChild(bt);
    }

    // Field name
    const fn = document.createElementNS('http://www.w3.org/2000/svg','text');
    fn.setAttribute('x', 10);
    fn.setAttribute('y', fy + 1);
    fn.setAttribute('dominant-baseline', 'middle');
    fn.setAttribute('class', 'field-name');
    if (f.pk) { fn.setAttribute('fill', 'var(--pk)'); }
    else if (f.fk) { fn.setAttribute('fill', 'var(--fk)'); }
    fn.textContent = f.name;
    g.appendChild(fn);

    // Field type
    const ft = document.createElementNS('http://www.w3.org/2000/svg','text');
    ft.setAttribute('x', W - (f.pk||f.fk ? 32 : 8));
    ft.setAttribute('y', fy + 1);
    ft.setAttribute('dominant-baseline', 'middle');
    ft.setAttribute('text-anchor', 'end');
    ft.setAttribute('class', 'field-type');
    ft.textContent = f.type;
    g.appendChild(ft);
  });

  // Round bottom corners
  const bot = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bot.setAttribute('y', h - 8);
  bot.setAttribute('width', W);
  bot.setAttribute('height', 8);
  bot.setAttribute('fill', 'var(--surface)');
  g.appendChild(bot);

  // Hover tooltip on mouseover
  g.addEventListener('mouseenter', (e) => showTooltip(t, e));
  g.addEventListener('mouseleave', hideTooltip);
  g.addEventListener('mousemove', moveTooltip);

  tableLayer.appendChild(g);
});

// ─────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(t, e) {
  const pkFields = t.fields.filter(f => f.pk).map(f => f.name).join(', ');
  const fkFields = t.fields.filter(f => f.fk).map(f => `${f.name} → ${f.fk}`).join('<br>');
  tooltip.innerHTML = `
    <div class="tt-title">${t.label}</div>
    <div class="tt-row"><span class="tt-key">Campi:</span><span class="tt-val">${t.fields.length}</span></div>
    <div class="tt-row"><span class="tt-key">PK:</span><span class="tt-val">${pkFields}</span></div>
    ${fkFields ? `<div style="margin-top:4px;color:#6b7280;font-size:10px">${fkFields}</div>` : ''}
  `;
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}

// ─────────────────────────────────────────────
// PAN & ZOOM
// ─────────────────────────────────────────────
const root = document.getElementById('root');
const wrap = document.getElementById('canvas-wrap');
let tx = -20, ty = -20, scale = 0.72;
let dragging = false, lastX, lastY;

function applyTransform() {
  root.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
}
applyTransform();

wrap.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  wrap.classList.add('grabbing');
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('grabbing'); });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX;
  ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = -e.deltaY * 0.001;
  const newScale = Math.max(0.2, Math.min(2.5, scale + delta * scale));
  // Zoom toward mouse
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * newScale / scale;
  ty = my - (my - ty) * newScale / scale;
  scale = newScale;
  applyTransform();
}, {passive: false});

// Touch support
let lastDist = null, lastTx, lastTy;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }
  if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
});
wrap.addEventListener('touchend', () => { dragging = false; lastDist = null; });
wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    tx += e.touches[0].clientX - lastX;
    ty += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    applyTransform();
  }
  if (e.touches.length === 2 && lastDist) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const newScale = Math.max(0.2, Math.min(2.5, scale * d / lastDist));
    scale = newScale; lastDist = d;
    applyTransform();
  }
}, {passive: false});

function resetView() { tx = -20; ty = -20; scale = 0.72; applyTransform(); }
function zoomIn() { scale = Math.min(2.5, scale * 1.2); applyTransform(); }
function zoomOut() { scale = Math.max(0.2, scale / 1.2); applyTransform(); }
</script>
